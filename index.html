<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>FBX Viewer – fullportal_textured</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #portal-viewer {
      width: 100%;
      height: 100%;
    }
    canvas { display: block; }
  </style>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { FBXLoader }   from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/FBXLoader.js';

    const container = document.getElementById('portal-viewer');

    let scene, camera, renderer, controls;

    init();
    loadModel();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x202020);

      const width  = window.innerWidth;
      const height = window.innerHeight;

      camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
      camera.position.set(2, 2, 4);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(width, height);
      container.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1, 0);
      controls.update();

      const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
      hemi.position.set(0, 1, 0);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 1);
      dir.position.set(5, 10, 7);
      scene.add(dir);

      const grid = new THREE.GridHelper(10, 10);
      scene.add(grid);

      window.addEventListener('resize', onWindowResize);
    }

    function loadModel() {
      const loader = new FBXLoader();
      loader.load(
        // FBX relativ zur index.html, Datei liegt in /models
        'models/fullportal_textured.fbx',
        (object) => {
          object.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          // ggf. anpassen, falls zu klein/groß
          object.scale.set(0.01, 0.01, 0.01);
          scene.add(object);
        },
        (xhr) => {
          console.log(`FBX loading: ${ (xhr.loaded / (xhr.total || 1)) * 100 }%`);
        },
        (error) => {
          console.error('FBX load error:', error);
        }
      );
    }

    function onWindowResize() {
      const width  = window.innerWidth;
      const height = window.innerHeight;

      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    }

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
  </script>
</head>
<body>
  <div id="portal-viewer"></div>
</body>
</html>
