<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>FBX Viewer – fullportal_textured</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #portal-viewer {
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
    }
  </style>

  <!-- Three.js (klassische UMD-Version) -->
  <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>

  <!-- FBXLoader + OrbitControls für diese Three-Version -->
  <script src="https://unpkg.com/three@0.149.0/examples/js/loaders/FBXLoader.js"></script>
  <script src="https://unpkg.com/three@0.149.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <div id="portal-viewer"></div>

  <script>
    const container = document.getElementById('portal-viewer');

    let scene, camera, renderer, controls;

    init();
    loadModel();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x202020);

      const width  = window.innerWidth;
      const height = window.innerHeight;

      camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
      camera.position.set(2, 2, 4);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(width, height);
      container.appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1, 0);
      controls.update();

      const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
      hemi.position.set(0, 1, 0);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 1);
      dir.position.set(5, 10, 7);
      scene.add(dir);

      const grid = new THREE.GridHelper(10, 10);
      scene.add(grid);

      window.addEventListener('resize', onWindowResize);
    }

    function loadModel() {
      const loader = new THREE.FBXLoader();
      loader.load(
        'models/fullportal_textured.fbx',
        function (object) {
          object.traverse(function (child) {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          object.scale.set(0.01, 0.01, 0.01);
          scene.add(object);
        },
        function (xhr) {
          console.log('FBX loading: ' + (xhr.loaded / (xhr.total || 1)) * 100 + '%');
        },
        function (error) {
          console.error('FBX load error:', error);
        }
      );
    }

      const
